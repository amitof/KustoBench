# ClickHouse environment — 2 nodes, 8 cores / 64 GB each
# Used with: --deploy envs/clickhouse-2node.yaml
#             --load envs/clickhouse-2node.yaml clickbench
#             --run envs/clickhouse-2node.yaml clickbench

type: clickhouse

# ── Connection (populated after deploy, or set manually for existing cluster) ──
host: ""
port: 8123

# ── Deployment settings (used by --deploy) ──────────────────────────────────
deploy:
  resource_group: "kustobench-ch-rg"
  location: "swedencentral"
  vm_count: 2
  vm_size: "Standard_E8s_v5"
  ssh_public_key_path: "~/.ssh/id_rsa.pub"
  admin_username: "benchadmin"
  base_name: "kustobench-ch"

# ClickBench dataset configuration for KustoBench
#
# Based on the ClickBench analytical benchmark (https://benchmark.clickhouse.com/).
# The dataset contains ~100 million rows of anonymised web-analytics page-view
# data ("hits" table from Yandex.Metrica) and 43 standardised queries covering
# scans, aggregations, filtering, sorting, and distinct-counting patterns.

name: clickbench
description: >
  ClickBench is an open analytical-database benchmark. It uses a single wide
  table (105 columns) of web-analytics hit data and 43 queries that exercise
  full-table scans, GROUP BY aggregations, filtering, sorting, DISTINCT
  counting, and string matching.

# -- Data files ---------------------------------------------------------------
# The data is distributed as 102 gzipped CSV part files (0001-0102).
data:
  format: csv
  table_name: hits
  storage_key: ""  # Set your Azure Storage account key here
